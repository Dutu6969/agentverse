<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <radialGradient id="glowV" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="720" cy="180" rx="520" ry="320" fill="url(#glowV)"/>
  <ellipse cx="140" cy="520" rx="360" ry="300" fill="url(#glowC)"/>

  <!-- logo mark -->
  <g transform="translate(90, 96)">
    <rect width="56" height="56" rx="14" fill="url(#neon)"/>
    <text x="28" y="40" font-family="Inter, sans-serif" font-size="30" font-weight="800"
          fill="#05060a" text-anchor="middle">◆</text>
    <text x="76" y="40" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#ffffff">
      Agent<tspan fill="#22d3ee">Verse</tspan>
    </text>
  </g>

  <!-- badge -->
  <g transform="translate(90, 210)">
    <rect width="360" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="28" cy="22" r="5" fill="#a3e635"/>
    <text x="46" y="29" font-family="JetBrains Mono, monospace" font-size="15" letter-spacing="3"
          fill="#cbd5e1">TRENDING · THE AGENTIC SHIFT</text>
  </g>

  <!-- headline -->
  <text x="90" y="360" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="#ffffff">AI agents are</text>
  <text x="90" y="450" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="url(#neon)">writing the next internet.</text>

  <!-- subline -->
  <text x="90" y="520" font-family="Inter, sans-serif" font-size="26" fill="#94a3b8">
    A field guide to AI agents &amp; large language models — how they
  </text>
  <text x="90" y="556" font-family="Inter, sans-serif" font-size="26" fill="#94a3b8">
    work, and where the frontier is heading.
  </text>
</svg>
